<!-- ===== TEMEL SEO ===== -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<title>OniList — Anime, Manga & Webtoon Takip Platformu | Ücretsiz</title>

<meta name="description" content="Track your anime, manga and webtoons easily with OniList. Create personal lists, rate series, view your stats. Completely free anime tracking app.">

<!-- ===== SCHEMA.ORG YAPISAL VERİ ===== -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebApplication",
      "@id": "https://onilist.com/#webapp",
      "name": "OniList",
      "description": "Anime, manga and webtoon tracking platform. Create free personal lists, rate series, and track your stats.",
      "url": "https://onilist.com/",
      "applicationCategory": "EntertainmentApplication",
      "operatingSystem": "Web, iOS, Android",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "TRY"
      },
      "featureList": [
        "Anime tracking list",
        "Manga tracking list",
        "Webtoon tracking list",
        "XP and level system",
        "Achievement badges",
        "Personal statistics",
        "Calendar view",
        "AI recommendations"
      ],
      "inLanguage": "en",
      "audience": {
        "@type": "Audience",
        "audienceType": "Anime and manga fans"
      }
    },
    {
      "@type": "WebSite",
      "@id": "https://onilist.com/#website",
      "url": "https://onilist.com/",
      "name": "OniList",
      "description": "Free anime, manga and webtoon tracking platform",
      "inLanguage": "en",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://onilist.com/?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    },
    {
      "@type": "Organization",
      "@id": "https://onilist.com/#organization",
      "name": "OniList",
      "url": "https://onilist.com/",
      "logo": {
        "@type": "ImageObject",
        "url": "https://onilist.com/icons/logo-512.png",
        "width": 512,
        "height": 512
      }
    },
    {
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is OniList free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, OniList is completely free. Sign up and start using it right away."
          }
        },
        {
          "@type": "Question",
          "name": "How do I sign up for OniList?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Visit the site, click the 'Sign Up' button, and create a free account with your email and password."
          }
        },
        {
          "@type": "Question",
          "name": "What content can I track?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "With OniList you can track anime, manga and webtoons. You can rate content and update their status."
          }
        }
      ]
    }
  ]
}
</script>
